name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Vue SPA
        run: make web

      - name: Prepare embed
        run: make web-embed

      - name: Build bot arm64
        run: make -C server build-arm64

      - name: Build bot arm
        run: make -C server build-arm

      - name: Build webui arm64
        run: make -C server build-webui-arm64

      - name: Build webui arm
        run: make -C server build-webui-arm

      - name: Move binaries
        run: mkdir -p bin && mv server/bin/* bin/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/telegram-bot-arm64
            bin/telegram-bot-arm
            bin/webui-arm64
            bin/webui-arm
